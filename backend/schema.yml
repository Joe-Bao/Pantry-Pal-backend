components:
  schemas:
    Item:
      type: object
      properties:
        PK:
          type: string
        SK:
          type: string
        name:
          type: string
          maxLength: 100
        quantity:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        unit:
          type: string
          maxLength: 100
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        expiresAt:
          type: integer
        createdAt:
          type: integer
        modifiedAt:
          type: integer
      required:
      - PK
      - SK
      - createdAt
      - expiresAt
      - modifiedAt
      - name
      - price
      - quantity
      - unit
    ItemCreate:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        quantity:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        unit:
          type: string
          maxLength: 100
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        expiresAt:
          type: integer
      required:
      - expiresAt
      - name
      - price
      - quantity
      - unit
    PatchedItemPatch:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        quantity:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        unit:
          type: string
          maxLength: 100
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        expiresAt:
          type: integer
    PatchedRecipePatch:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        instructions:
          type: array
          items:
            type: string
        servings:
          type: integer
        diets:
          type: array
          items:
            type: string
        summary:
          type: string
          maxLength: 512
        img:
          type: string
          format: uri
        readyInMinutes:
          type: integer
    PatchedShoppingListPatch:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
    PatchedUserInfoPatch:
      type: object
      properties:
        email:
          type: string
          format: email
          maxLength: 100
        allergies:
          type: array
          items:
            type: string
        diets:
          type: array
          items:
            type: string
        intolerances:
          type: array
          items:
            type: string
    Recipe:
      type: object
      properties:
        PK:
          type: string
        SK:
          type: string
        name:
          type: string
          maxLength: 100
        instructions:
          type: array
          items:
            type: string
        servings:
          type: integer
        diets:
          type: array
          items:
            type: string
        summary:
          type: string
          maxLength: 512
        img:
          type: string
          format: uri
        readyInMinutes:
          type: integer
        createdAt:
          type: integer
        modifiedAt:
          type: integer
      required:
      - PK
      - SK
      - createdAt
      - diets
      - img
      - instructions
      - modifiedAt
      - name
      - readyInMinutes
      - servings
      - summary
    RecipeCreate:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        instructions:
          type: array
          items:
            type: string
        servings:
          type: integer
        diets:
          type: array
          items:
            type: string
        summary:
          type: string
          maxLength: 512
        img:
          type: string
          format: uri
        readyInMinutes:
          type: integer
      required:
      - diets
      - img
      - instructions
      - name
      - readyInMinutes
      - servings
      - summary
    RecipePreview:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
          maxLength: 100
        img:
          type: string
          format: uri
      required:
      - id
      - img
      - name
    RecipePreviewInfo:
      type: object
      properties:
        recipe:
          $ref: '#/components/schemas/RecipeCreate'
        ingredients:
          type: array
          items:
            $ref: '#/components/schemas/ItemCreate'
      required:
      - ingredients
      - recipe
    ShoppingList:
      type: object
      properties:
        PK:
          type: string
        SK:
          type: string
        name:
          type: string
          maxLength: 100
        createdAt:
          type: integer
        modifiedAt:
          type: integer
      required:
      - PK
      - SK
      - createdAt
      - modifiedAt
      - name
    ShoppingListCreate:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
      required:
      - name
    User:
      type: object
      properties:
        PK:
          type: string
